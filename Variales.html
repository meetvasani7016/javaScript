<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //types of variable
        //1.var
        //can be redeclared 
        //can be updated
        //2.let
        //can't be redeclared 
        //can be updated
        //3.const
        //can't be redeclared 
        //can't be updated

        //declared but not initialized
        let variableName;

        //declared and initialized
        let variable_name = anyValue;

        //1. var
        var name = "meet";
        console.log(name);

        //2. let
        let age = 19;
        console.log(age);

        //3. const
        const pi = 3.14;
        console.log(pi);
    </script>
</body>
</html>
